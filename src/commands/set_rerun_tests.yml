description: "Set Browserstack Rerun Tests & delete environment variable if needed"

parameters:
  delete_env_var:
    description: "Delete the environment variable"
    default: false
    type: boolean

steps:
  - run:
      name: Set Rerun Tests
      command: <<include(scripts/rerun_tests.sh)>>
      environment:
        DELETE_ENV_VAR: << parameters.delete_env_var >>
